    <style>
        :root {
            --bg: #FFF9F5;
            --accent: #FFB7B2;
            --text: #4A3F35;
            --shadow: 0 8px 30px rgba(0,0,0,0.08);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: var(--bg); }
        body { font-family: 'Inter', sans-serif; color: var(--text); display: flex; flex-direction: column; }

        h1 { font-family: 'DM Serif Display', serif; margin: 10px 0; color: var(--text); }
        h2 { font-family: 'DM Serif Display', serif; font-size: 1.2rem; margin: 20px 0 10px 0; }

        #main-container { flex: 1; position: relative; width: 100%; }

        .view {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 20px; display: flex; flex-direction: column;
            background: var(--bg); overflow-y: auto; -webkit-overflow-scrolling: touch;
        }

        .view.hidden { transform: translateX(100%); pointer-events: none; }
        .view.active { transform: translateX(0); }

        .header { text-align: center; padding-top: 10px; flex-shrink: 0; }
        
        .widget-preview-wrapper {
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
        }
        
        .widget-preview {
            width: 320px;
            height: 320px;
            max-width: 85vw;
            max-height: 85vw;
            background: #f0f0f0;
            border-radius: 60px; 
            overflow: hidden;
            border: 8px solid white; 
            box-shadow: var(--shadow);
            position: relative;
        }
        .widget-preview img, .widget-preview video { width: 100%; height: 100%; object-fit: cover; }

        .memories-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 10px; padding-bottom: 120px;
        }
        .memory-item {
            aspect-ratio: 1/1; border-radius: 15px;
            overflow: hidden; background: #eee; position: relative;
        }
        .memory-item img, .memory-item video { width: 100%; height: 100%; object-fit: cover; }

        #camera-view { background: #000; padding: 0; overflow: hidden; }
        
        #video-preview { 
            width: 100%; 
            height: 100%; 
            object-fit: cover;
            transform: scaleX(-1);
        }
        
        .camera-controls {
            position: absolute; bottom: calc(40px + var(--safe-bottom)); 
            width: 100%; display: flex; flex-direction: column; align-items: center; gap: 20px;
        }
        
        .capture-btn {
            width: 80px; height: 80px; border-radius: 50%;
            border: 6px solid white; background: transparent; position: relative;
        }
        .capture-btn::after {
            content: ''; position: absolute; top: 6px; left: 6px; right: 6px; bottom: 6px;
            background: white; border-radius: 50%;
        }
        .recording::after { background: #ff4d4d; border-radius: 12px; transform: scale(0.6); }

        .nav-bar {
            height: calc(80px + var(--safe-bottom));
            background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: var(--safe-bottom); border-top: 1px solid rgba(0,0,0,0.05);
            flex-shrink: 0;
        }
        .nav-item { border: none; background: none; font-size: 1.8rem; color: #ddd; padding: 10px; }
        .nav-item.active-nav { color: var(--accent); }

        .del-icon {
            position: absolute; top: 5px; right: 5px;
            background: rgba(0,0,0,0.3); color: white; border: none;
            border-radius: 50%; width: 22px; height: 22px; font-size: 12px;
        }
        .flip-btn {
            position: absolute; top: 40px; right: 20px;
            background: rgba(255,255,255,0.2); border: none; border-radius: 50%;
            width: 45px; height: 45px; color: white; font-size: 1.2rem;
            backdrop-filter: blur(5px); z-index: 10;
        }
    </style>
